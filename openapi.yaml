openapi: 3.1.0
info:
  title: Virtual Tools Registry API
  version: 0.1.0
  description: >-
    Control plane API for the Virtual Tools registry. Manages versioned tool, agent, schema, and server definitions with
    lifecycle enforcement and lineage queries.


    Generated from TypeScript type definitions (schema.ts, api.ts).

    Requirements: docs/design/virtual-tools-requirements.md §4.1
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /tools:
    post:
      summary: Register a tool
      description: Register a physical or virtual tool definition. Static validation runs at registration time (§4.1.1).
      tags:
        - Tools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToolRequest"
      responses:
        "201":
          description: Tool registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateToolResponse"
        "400":
          description: Static validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationError"
    get:
      summary: List tools
      description: Query tools by name, version, environment, server, or tags.
      tags:
        - Tools
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
          description: SemVer range filter
        - name: environment
          in: query
          schema:
            type: string
        - name: server
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Tool list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListToolsResponse"
  /tools/{name}:
    get:
      summary: Get latest version of a tool
      tags:
        - Tools
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetToolResponse"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /tools/{name}/{version}:
    get:
      summary: Get a specific tool version
      tags:
        - Tools
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetToolResponse"
        "404":
          description: Tool or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      summary: Delete a tool version
      description: "Lifecycle enforcement (§4.1.1): rejects if prod agents depend on this version, warns if only stage agents
        depend on it."
      tags:
        - Tools
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deletion result (may be blocked by dependents)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteToolResponse"
        "404":
          description: Tool or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /agents:
    post:
      summary: Register an agent
      description: Register an agent with versioned tool dependencies and environment tag (§4.1.2).
      tags:
        - Agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      summary: List agents
      tags:
        - Agents
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: environment
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentsResponse"
  /schemas:
    post:
      summary: Register a schema
      description: Register a named, versioned JSON Schema (§4.1.3). Tools reference schemas via $ref.
      tags:
        - Schemas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSchemaRequest"
      responses:
        "201":
          description: Schema registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSchemaResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      summary: List schemas
      tags:
        - Schemas
      responses:
        "200":
          description: Schema list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchemasResponse"
  /servers:
    post:
      summary: Register an MCP server
      description: Register a backend MCP server declaration (§4.1.4). Used for SBOM tracking and lifecycle validation.
      tags:
        - Servers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServerRequest"
      responses:
        "201":
          description: Server registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServerResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      summary: List servers
      tags:
        - Servers
      responses:
        "200":
          description: Server list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServersResponse"
  /lineage/forward/{agentName}:
    get:
      summary: Forward lineage query
      description: "§4.1.5 Forward: Given agent X, return all (tool, version) tuples it depends on."
      tags:
        - Lineage
      parameters:
        - name: agentName
          in: path
          required: true
          schema:
            type: string
        - name: agentVersion
          in: query
          schema:
            type: string
        - name: environment
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resolved dependencies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForwardLineageResult"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /lineage/reverse/{toolName}:
    get:
      summary: Reverse lineage query
      description: "§4.1.5 Reverse: Given tool Y (optionally version Z), return all agents that depend on it."
      tags:
        - Lineage
      parameters:
        - name: toolName
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
          description: Specific version to check
        - name: environment
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Dependent agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReverseLineageResult"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    ToolDefinition:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
          pattern: ^\d+\.\d+\.\d+$
        description:
          type: string
        environment:
          type: string
        tags:
          type: array
          items:
            type: string
        annotations:
          type: object
          additionalProperties: {}
        implementation:
          anyOf:
            - type: object
              properties:
                source:
                  type: object
                  properties:
                    server:
                      type: string
                    serverVersion:
                      type: string
                      minLength: 1
                    tool:
                      type: string
                    projection:
                      type: array
                      items:
                        type: string
                    defaults:
                      type: object
                      additionalProperties: {}
                    fieldMapping:
                      type: object
                      additionalProperties:
                        type: string
                  required:
                    - server
                    - tool
                  additionalProperties: false
              required:
                - source
              additionalProperties: false
            - type: object
              properties:
                composition:
                  anyOf:
                    - type: object
                      properties:
                        pipeline:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - stateless
                            steps:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  operation:
                                    anyOf:
                                      - type: object
                                        properties:
                                          tool:
                                            type: string
                                          version:
                                            $ref: "#/components/schemas/ToolDefinition/properties/implementation/anyOf/0/properties/source/properties/serverVersion"
                                        required:
                                          - tool
                                        additionalProperties: false
                                      - type: object
                                        properties:
                                          composition:
                                            $ref: "#/components/schemas/ToolDefinition/properties/implementation/anyOf/1/properties/composition"
                                        required:
                                          - composition
                                        additionalProperties: false
                                  input:
                                    anyOf:
                                      - type: object
                                        properties:
                                          fromInput:
                                            type: object
                                            properties:
                                              path:
                                                type: string
                                                pattern: ^\$
                                            required:
                                              - path
                                            additionalProperties: false
                                        required:
                                          - fromInput
                                        additionalProperties: false
                                      - type: object
                                        properties:
                                          fromStep:
                                            type: object
                                            properties:
                                              stepId:
                                                type: string
                                              path:
                                                $ref: "#/components/schemas/ToolDefinition/properties/implementation/anyOf/1/properties/composition/anyOf/0/properties/\
                                                  pipeline/properties/steps/items/properties/input/anyOf/0/properties/f\
                                                  romInput/properties/path"
                                            required:
                                              - stepId
                                              - path
                                            additionalProperties: false
                                        required:
                                          - fromStep
                                        additionalProperties: false
                                      - type: object
                                        properties:
                                          constant: {}
                                        additionalProperties: false
                                      - type: object
                                        properties:
                                          construct:
                                            type: object
                                            properties:
                                              fields:
                                                type: object
                                                additionalProperties:
                                                  $ref: "#/components/schemas/ToolDefinition/properties/implementation/anyOf/1/properties/composition/anyOf/0/properties/\
                                                    pipeline/properties/steps/items/properties/input"
                                            required:
                                              - fields
                                            additionalProperties: false
                                        required:
                                          - construct
                                        additionalProperties: false
                                required:
                                  - id
                                  - operation
                                additionalProperties: false
                              minItems: 1
                          required:
                            - steps
                          additionalProperties: false
                      required:
                        - pipeline
                      additionalProperties: false
                    - type: object
                      properties:
                        scatterGather:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - stateless
                            targets:
                              type: array
                              items:
                                anyOf:
                                  - type: object
                                    properties:
                                      tool:
                                        type: string
                                      version:
                                        $ref: "#/components/schemas/ToolDefinition/properties/implementation/anyOf/0/properties/source/properties/serverVersion"
                                      optional:
                                        type: boolean
                                    required:
                                      - tool
                                    additionalProperties: false
                                  - type: object
                                    properties:
                                      composition:
                                        $ref: "#/components/schemas/ToolDefinition/properties/implementation/anyOf/1/properties/composition"
                                      optional:
                                        type: boolean
                                    required:
                                      - composition
                                    additionalProperties: false
                              minItems: 1
                            aggregation:
                              type: array
                              items:
                                anyOf:
                                  - type: object
                                    properties:
                                      extract:
                                        type: object
                                        properties:
                                          path:
                                            $ref: "#/components/schemas/ToolDefinition/properties/implementation/anyOf/1/properties/composition/anyOf/0/properties/\
                                              pipeline/properties/steps/items/properties/input/anyOf/0/properties/fromI\
                                              nput/properties/path"
                                        required:
                                          - path
                                        additionalProperties: false
                                    required:
                                      - extract
                                    additionalProperties: false
                                  - type: object
                                    properties:
                                      flatten:
                                        type: boolean
                                        enum:
                                          - true
                                    required:
                                      - flatten
                                    additionalProperties: false
                                  - type: object
                                    properties:
                                      dedupe:
                                        type: object
                                        properties:
                                          field:
                                            $ref: "#/components/schemas/ToolDefinition/properties/implementation/anyOf/1/properties/composition/anyOf/0/properties/\
                                              pipeline/properties/steps/items/properties/input/anyOf/0/properties/fromI\
                                              nput/properties/path"
                                        required:
                                          - field
                                        additionalProperties: false
                                    required:
                                      - dedupe
                                    additionalProperties: false
                                  - type: object
                                    properties:
                                      sort:
                                        type: object
                                        properties:
                                          field:
                                            $ref: "#/components/schemas/ToolDefinition/properties/implementation/anyOf/1/properties/composition/anyOf/0/properties/\
                                              pipeline/properties/steps/items/properties/input/anyOf/0/properties/fromI\
                                              nput/properties/path"
                                          order:
                                            type: string
                                            enum:
                                              - asc
                                              - desc
                                        required:
                                          - field
                                          - order
                                        additionalProperties: false
                                    required:
                                      - sort
                                    additionalProperties: false
                                  - type: object
                                    properties:
                                      limit:
                                        type: object
                                        properties:
                                          count:
                                            type: integer
                                            exclusiveMinimum: true
                                            minimum: 0
                                        required:
                                          - count
                                        additionalProperties: false
                                    required:
                                      - limit
                                    additionalProperties: false
                                  - type: object
                                    properties:
                                      wrap:
                                        type: object
                                        properties:
                                          field:
                                            type: string
                                        required:
                                          - field
                                        additionalProperties: false
                                    required:
                                      - wrap
                                    additionalProperties: false
                                  - type: object
                                    properties:
                                      merge:
                                        type: boolean
                                        enum:
                                          - true
                                    required:
                                      - merge
                                    additionalProperties: false
                            timeoutMs:
                              type: integer
                              exclusiveMinimum: true
                              minimum: 0
                          required:
                            - targets
                          additionalProperties: false
                      required:
                        - scatterGather
                      additionalProperties: false
              required:
                - composition
              additionalProperties: false
        inputSchema:
          type: object
          additionalProperties: {}
        outputSchema:
          $ref: "#/components/schemas/ToolDefinition/properties/inputSchema"
        outputTransform:
          type: object
          properties:
            mappings:
              type: object
              additionalProperties:
                anyOf:
                  - type: object
                    properties:
                      path:
