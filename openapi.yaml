                              properties:
                                type:
                                  type: string
                                  enum:
                                    - stateless
                                steps:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      id:
                                        type: string
                                      operation:
                                        anyOf:
                                          - type: object
                                            properties:
                                              tool:
                                                type: string
                                              version:
                                                $ref: "#/components/schemas/CreateToolRequest/properties/tool/properties/implementation/anyOf/0/properties/source/prope\
                                                  rties/serverVersion"
                                            required:
                                              - tool
                                            additionalProperties: false
                                          - type: object
                                            properties:
                                              composition:
                                                $ref: "#/components/schemas/CreateToolRequest/properties/tool/properties/implementation/anyOf/1/properties/composition"
                                            required:
                                              - composition
                                            additionalProperties: false
                                      input:
                                        anyOf:
                                          - type: object
                                            properties:
                                              fromInput:
                                                type: object
                                                properties:
                                                  path:
                                                    type: string
                                                    pattern: ^\$
                                                required:
                                                  - path
                                                additionalProperties: false
                                            required:
                                              - fromInput
                                            additionalProperties: false
                                          - type: object
                                            properties:
                                              fromStep:
                                                type: object
                                                properties:
                                                  stepId:
                                                    type: string
                                                  path:
                                                    $ref: "#/components/schemas/CreateToolRequest/properties/tool/properties/implementation/anyOf/1/properties/composition/\
                                                      anyOf/0/properties/pipeline/properties/steps/items/properties/inp\
                                                      ut/anyOf/0/properties/fromInput/properties/path"
                                                required:
                                                  - stepId
                                                  - path
                                                additionalProperties: false
                                            required:
                                              - fromStep
                                            additionalProperties: false
                                          - type: object
                                            properties:
                                              constant: {}
                                            additionalProperties: false
                                          - type: object
                                            properties:
                                              construct:
                                                type: object
                                                properties:
                                                  fields:
                                                    type: object
                                                    additionalProperties:
                                                      $ref: "#/components/schemas/CreateToolRequest/properties/tool/properties/implementation/anyOf/1/properties/composition/\
                                                        anyOf/0/properties/pipeline/properties/steps/items/properties/i\
                                                        nput"
                                                required:
                                                  - fields
                                                additionalProperties: false
                                            required:
                                              - construct
                                            additionalProperties: false
                                    required:
                                      - id
                                      - operation
                                    additionalProperties: false
                                  minItems: 1
                              required:
                                - steps
                              additionalProperties: false
                          required:
                            - pipeline
                          additionalProperties: false
                        - type: object
                          properties:
                            scatterGather:
                              type: object
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - stateless
                                targets:
                                  type: array
                                  items:
                                    anyOf:
                                      - type: object
                                        properties:
                                          tool:
                                            type: string
                                          version:
                                            $ref: "#/components/schemas/CreateToolRequest/properties/tool/properties/implementation/anyOf/0/properties/source/prope\
                                              rties/serverVersion"
                                          optional:
                                            type: boolean
                                        required:
                                          - tool
                                        additionalProperties: false
                                      - type: object
                                        properties:
                                          composition:
                                            $ref: "#/components/schemas/CreateToolRequest/properties/tool/properties/implementation/anyOf/1/properties/composition"
                                          optional:
                                            type: boolean
                                        required:
                                          - composition
                                        additionalProperties: false
                                  minItems: 1
                                aggregation:
                                  type: array
                                  items:
                                    anyOf:
                                      - type: object
                                        properties:
                                          extract:
                                            type: object
                                            properties:
                                              path:
                                                $ref: "#/components/schemas/CreateToolRequest/properties/tool/properties/implementation/anyOf/1/properties/composition/\
                                                  anyOf/0/properties/pipeline/properties/steps/items/properties/input/a\
                                                  nyOf/0/properties/fromInput/properties/path"
                                            required:
                                              - path
                                            additionalProperties: false
                                        required:
                                          - extract
                                        additionalProperties: false
                                      - type: object
                                        properties:
                                          flatten:
                                            type: boolean
                                            enum:
                                              - true
                                        required:
                                          - flatten
                                        additionalProperties: false
                                      - type: object
                                        properties:
                                          dedupe:
                                            type: object
                                            properties:
                                              field:
                                                $ref: "#/components/schemas/CreateToolRequest/properties/tool/properties/implementation/anyOf/1/properties/composition/\
                                                  anyOf/0/properties/pipeline/properties/steps/items/properties/input/a\
                                                  nyOf/0/properties/fromInput/properties/path"
                                            required:
                                              - field
                                            additionalProperties: false
                                        required:
                                          - dedupe
                                        additionalProperties: false
                                      - type: object
                                        properties:
                                          sort:
                                            type: object
                                            properties:
                                              field:
                                                $ref: "#/components/schemas/CreateToolRequest/properties/tool/properties/implementation/anyOf/1/properties/composition/\
                                                  anyOf/0/properties/pipeline/properties/steps/items/properties/input/a\
                                                  nyOf/0/properties/fromInput/properties/path"
                                              order:
                                                type: string
                                                enum:
                                                  - asc
                                                  - desc
                                            required:
                                              - field
                                              - order
                                            additionalProperties: false
                                        required:
                                          - sort
                                        additionalProperties: false
                                      - type: object
                                        properties:
                                          limit:
                                            type: object
                                            properties:
                                              count:
                                                type: integer
                                                exclusiveMinimum: true
                                                minimum: 0
                                            required:
                                              - count
                                            additionalProperties: false
                                        required:
                                          - limit
                                        additionalProperties: false
                                      - type: object
                                        properties:
                                          wrap:
                                            type: object
                                            properties:
                                              field:
                                                type: string
                                            required:
                                              - field
                                            additionalProperties: false
                                        required:
                                          - wrap
                                        additionalProperties: false
                                      - type: object
                                        properties:
