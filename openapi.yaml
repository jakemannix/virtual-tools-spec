                          pipeline/properties/steps/items/properties/input/anyOf/0/properties/fromInput/properties/path"
                      default: {}
                    required:
                      - path
                    additionalProperties: false
                  - type: object
                    properties:
                      value: {}
                    additionalProperties: false
                  - type: object
                    properties:
                      over:
                        $ref: "#/components/schemas/ToolDefinition/properties/implementation/anyOf/1/properties/composition/anyOf/0/properties/\
                          pipeline/properties/steps/items/properties/input/anyOf/0/properties/fromInput/properties/path"
                      fields:
                        type: object
                        additionalProperties:
                          $ref: "#/components/schemas/ToolDefinition/properties/outputTransform/properties/mappings/additionalProperties"
                    required:
                      - over
                      - fields
                    additionalProperties: false
          required:
            - mappings
          additionalProperties: false
        metadata:
          type: object
          additionalProperties: {}
      required:
        - name
        - version
        - implementation
      additionalProperties: false
    AgentDefinition:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
          pattern: ^\d+\.\d+\.\d+$
        description:
          type: string
        environment:
          type: string
        dependencies:
          type: array
          items:
            type: object
            properties:
              tool:
                type: string
              versionRange:
                type: string
                minLength: 1
            required:
              - tool
              - versionRange
            additionalProperties: false
        metadata:
          type: object
          additionalProperties: {}
      required:
        - name
        - version
        - environment
        - dependencies
      additionalProperties: false
    SchemaDefinition:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
          pattern: ^\d+\.\d+\.\d+$
        description:
          type: string
        schema:
          type: object
          additionalProperties: {}
        metadata:
          type: object
          additionalProperties: {}
      required:
        - name
        - version
        - schema
      additionalProperties: false
    ServerDefinition:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
          pattern: ^\d+\.\d+\.\d+$
        description:
          type: string
        providedTools:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              version:
                $ref: "#/components/schemas/ServerDefinition/properties/version"
            required:
              - name
              - version
            additionalProperties: false
        metadata:
          type: object
          additionalProperties: {}
      required:
        - name
        - version
        - providedTools
      additionalProperties: false
    CreateToolRequest:
      type: object
      properties:
        tool:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
              pattern: ^\d+\.\d+\.\d+$
            description:
              type: string
            environment:
              type: string
            tags:
              type: array
              items:
                type: string
            annotations:
              type: object
              additionalProperties: {}
            implementation:
              anyOf:
                - type: object
                  properties:
                    source:
                      type: object
                      properties:
                        server:
                          type: string
                        serverVersion:
                          type: string
                          minLength: 1
                        tool:
                          type: string
                        projection:
                          type: array
                          items:
                            type: string
                        defaults:
                          type: object
                          additionalProperties: {}
                        fieldMapping:
                          type: object
                          additionalProperties:
                            type: string
                      required:
                        - server
                        - tool
                      additionalProperties: false
                  required:
